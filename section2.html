<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wifey 💝</title>
<link rel="stylesheet" href="style2.css">
</head>

<body>

<!-- Top GIF -->
<div class="gif-container">
    <img src="https://media4.giphy.com/media/v1.Y2lkPTZjMDliOTUybjNoOWt3dXQ2cnlyMDE2eXNqNjJtcGM2a28xMG9pMmp5YjdtandxZiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/fvN5KrNcKKUyX7hNIA/giphy.gif" alt="Cute GIF">
</div>

<div class="grid-container">

  <!-- Love Note -->
  <div class="frame-wrapper">
    <div class="frame">
        <img src="https://raw.githubusercontent.com/pjrbors/for-my-wife/main/4157874.png" class="frame-icon" alt="Envelope Icon">
    </div>
    <p class="frame-label">Love Note</p>
  </div>

  <!-- Photo -->
  <div class="frame-wrapper">
    <div class="frame">
        <img src="https://raw.githubusercontent.com/pjrbors/for-my-wife/main/5904483.png" class="frame-icon" alt="Camera Icon">
    </div>
    <p class="frame-label">Photo</p>
  </div>

  <!-- Surprise -->
  <div class="frame-wrapper">
    <div class="frame" onclick="openSurprise()">
        <img src="https://raw.githubusercontent.com/pjrbors/for-my-wife/main/3787677.png" class="frame-icon" alt="Surprise Icon">
    </div>
    <p class="frame-label">Surprise</p>
  </div>

  <!-- Birthday GIF -->
  <div class="frame-wrapper">
    <div class="frame">
        <img src="https://raw.githubusercontent.com/pjrbors/for-my-wife/main/happy-birthday-iccychan.gif" class="frame-icon" alt="Birthday GIF">
    </div>
  </div>

</div>

<!-- Surprise Popup -->
<div id="surprisePopup" class="popup">
  <div class="popup-content">

    <h2>Pick a gift</h2>

    <div class="gift-container">
      <div class="gift" onclick="openGift(1)">🎁</div>
      <div class="gift" onclick="openGift(2)">🎁</div>
    </div>

    <div id="giftResult" class="gift-result"></div>

    <button onclick="closeSurprise()">Close</button>

  </div>
</div>

<script src="script2.js"></script>
</body>
</html>
