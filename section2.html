<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wifey 💝</title>
<link rel="stylesheet" href="style2.css">
</head>

<body>

<!-- GIF at the top as a square box -->
<div class="gif-container">
    <img src="https://media4.giphy.com/media/v1.Y2lkPTZjMDliOTUybjNoOWt3dXQ2cnlyMDE2eXNqNjJtcGM2a28xMG9pMmp5YjdtandxZiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/fvN5KrNcKKUyX7hNIA/giphy.gif" alt="Cute GIF">
</div>

<div class="grid-container">
  <!-- Love Note Frame -->
  <div class="frame-wrapper">
    <div class="frame">
        <img src="https://raw.githubusercontent.com/pjrbors/for-my-wife/main/4157874.png" alt="Envelope Icon" class="frame-icon">
    </div>
    <p class="frame-label">Love Note</p>
  </div>

  <!-- Photo Frame -->
  <div class="frame-wrapper">
    <div class="frame">
        <img src="https://raw.githubusercontent.com/pjrbors/for-my-wife/main/5904483.png" alt="Camera Icon" class="frame-icon">
    </div>
    <p class="frame-label">Photo</p>
  </div>

  <!-- Surprise Frame -->
  <div class="frame-wrapper">
    <div class="frame">
        <img src="https://raw.githubusercontent.com/pjrbors/for-my-wife/main/3787677.png" alt="Surprise Icon" class="frame-icon">
    </div>
    <p class="frame-label">Surprise</p>
  </div>

  <!-- Birthday GIF Frame -->
  <div class="frame-wrapper">
    <div class="frame">
        <img src="https://raw.githubusercontent.com/pjrbors/for-my-wife/main/happy-birthday-iccychan.gif" alt="Birthday GIF" class="frame-icon">
    </div>
  </div>
</div>

</body>
</html>
